<html>
<head>
<title>AI App Compiler</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    padding: 40px;
}

/* HEADER */
h1 {
    color: #38bdf8;
    font-size: 32px;
}

/* INPUT AREA */
.input-container {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #1e293b;
    color: white;
}

button {
    padding: 14px 20px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #38bdf8, #6366f1);
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0px 0px 15px #38bdf8;
}

/* CARDS */
.card {
    background: rgba(30,41,59,0.6);
    backdrop-filter: blur(12px);
    padding: 20px;
    margin-top: 20px;
    border-radius: 14px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 0.6s ease-in;
}

pre {
    white-space: pre-wrap;
    font-size: 13px;
}

/* PIPELINE VISUAL */
.pipeline {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.step {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 10px;
    background: #1e293b;
    opacity: 0.6;
    transition: 0.3s;
}

.step.active {
    opacity: 1;
    background: linear-gradient(45deg, #22c55e, #16a34a);
    box-shadow: 0px 0px 10px #22c55e;
}

/* LOADER */
.loader {
    margin-top: 20px;
    font-size: 18px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% {opacity: 0.4;}
    50% {opacity: 1;}
    100% {opacity: 0.4;}
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<h1>AI App Compiler 🚀</h1>
<p><i>Input → Intent → Design → Schema → Validation</i></p>

<div class="input-container">
    <input id="input" placeholder="Build a CRM with login and dashboard"/>
    <button onclick="generate()">Generate</button>
</div>

<!-- PIPELINE -->
<div class="pipeline">
    <div id="step1" class="step">Intent</div>
    <div id="step2" class="step">Design</div>
    <div id="step3" class="step">Schema</div>
    <div id="step4" class="step">Validation</div>
</div>

<div id="loader" class="loader"></div>

<div id="metrics" class="card"></div>

<div id="output" class="card"></div>

<script>
function activateStep(stepId) {
    document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
    document.getElementById(stepId).classList.add("active");
}

async function generate() {
    const input = document.getElementById("input").value;

    document.getElementById("output").innerHTML = "";
    document.getElementById("loader").innerHTML = "⚡ Generating...";

    activateStep("step1");

    const res = await fetch(`/generate?user_input=${encodeURIComponent(input)}`, {
        method: "POST"
    });

    activateStep("step2");

    const data = await res.json();

    activateStep("step3");

    setTimeout(() => activateStep("step4"), 300);

    document.getElementById("loader").innerHTML = "";

    // METRICS
    document.getElementById("metrics").innerHTML = `
        <b>Status:</b> ${data.meta.status}<br>
        <b>Valid:</b> ${data.meta.valid}<br>
        <b>Error Count:</b> ${data.meta.error_count}<br>
        <b>Success Rate:</b> ${data.metrics.success_rate}%<br>
    `;

    // OUTPUT
    document.getElementById("output").innerHTML = `
        <h3>Intent</h3>
        <pre>${JSON.stringify(data.intent, null, 2)}</pre>

        <h3>Design</h3>
        <pre>${JSON.stringify(data.design, null, 2)}</pre>

        <h3>Schema</h3>
        <pre>${JSON.stringify(data.schema, null, 2)}</pre>

        <h3>Execution</h3>
        <pre>${JSON.stringify(data.execution, null, 2)}</pre>
    `;
}
</script>

</body>
</html>
